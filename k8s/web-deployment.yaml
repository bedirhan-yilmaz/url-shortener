apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-web
  namespace: url-shortener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-shortener-web
  template:
    metadata:
      labels:
        app: url-shortener-web
    spec:
      containers:
        - name: url-shortener-web
          image: url-shortener-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              value: url-shortener-service-svc
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
