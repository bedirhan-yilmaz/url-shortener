name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-url-shortener-service:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14.2"

    - name: Install dependencies
      working-directory: url-shortener-service
      run: |
        python -m pip install --upgrade pip
        pip install \
          fastapi \
          starlette \
          pydantic[email] \
          python-dotenv \
          asyncpg \
          httpx \
          pytest \
          pytest-asyncio \
          pytest-mock

    - name: Run tests
      working-directory: url-shortener-service
      run: pytest
